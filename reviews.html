<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQRA 4D Animated Logo</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; justify-content: center; align-items: center; font-family: 'Montserrat', sans-serif; overflow: hidden; }

        /* Full Screen Splash Container */
        #splash {
            position: fixed; width: 100%; height: 100vh;
            background: radial-gradient(circle, #2c2c2c, #000);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000;
        }

        /* Large 4D Logo Box */
        .logo-container {
            position: relative;
            width: 450px; height: 450px;
            background: #222;
            border-radius: 80px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 20px 20px 60px #000, -5px -5px 30px #444;
            border: 2px solid #333;
            margin-bottom: 40px;
        }

        svg { width: 80%; height: 80%; overflow: visible; }
        .logo-path { fill: none; stroke-width: 8; stroke-linecap: round; opacity: 0; }
        .blue-part { stroke: #007bff; filter: drop-shadow(0 0 8px #007bff); }
        .grey-part { stroke: #b0b0b0; filter: drop-shadow(0 0 8px #888); }

        @keyframes draw { to { stroke-dashoffset: 0; opacity: 1; } }
        @keyframes slideIn { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .text-iqra {
            color: white; font-size: 45px; letter-spacing: 25px; font-weight: 300;
            margin-top: 20px; opacity: 0; text-transform: uppercase;
        }

        .btn-review {
            margin-top: 50px; padding: 20px 60px; font-size: 22px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); opacity: 0; transition: 0.3s;
        }
        .btn-review:hover { transform: scale(1.1); box-shadow: 0 15px 30px rgba(0,123,255,0.4); }

        #review-page { display: none; width: 100%; height: 100vh; background: #1a1a1a; text-align: center; padding-top: 100px; color: white; }
        textarea { width: 80%; height: 200px; border-radius: 20px; padding: 20px; font-size: 1.2rem; background: #2c2c2c; color: white; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-container">
            <svg viewBox="0 0 200 200">
                <path class="logo-path blue-part" id="q-circle" d="M100,20 A80,80 0 1,1 100,180 A80,80 0 1,1 100,20 M140,140 L170,170" 
                    style="stroke-dasharray: 600; stroke-dashoffset: 600; animation: draw 1.5s forwards 0.5s;"/>
                <path class="logo-path grey-part" id="ra-shape" d="M70,140 L100,60 L130,140 M85,100 L125,100 M100,60 L100,45" 
                    style="stroke-dasharray: 400; stroke-dashoffset: 400; animation: draw 1.5s forwards 1.5s;"/>
                <path class="logo-path blue-part" d="M90,45 L100,35 L110,45 L100,40 Z" 
                    style="fill: #007bff; opacity:0; animation: slideIn 0.5s forwards 2.5s;"/>
            </svg>
        </div>
        <div class="text-iqra" style="animation: slideIn 1s forwards 3s;">IQRA</div>
        <button class="btn-review" id="reviewBtn" onclick="openReview()">Write Review</button>
    </div>

    <div id="review-page">
        <h1 style="color: #007bff; font-size: 3rem;">Review Page</h1>
        <p>How were the notes?</p>
        <textarea id="userReview" placeholder="Enter your feedback here..."></textarea><br>
        <button class="btn-review" style="opacity: 1;" onclick="submitReview()">Submit Review</button>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxCwO3AkbDYvx_fjAYsOrbuG8Urh1v8n47-saRnsOKA4irMpYNoZC0YVBY6yO9Ub0_1/exec';

        // Show Write Review button after animation
        setTimeout(() => {
            document.getElementById('reviewBtn').style.opacity = '1';
        }, 4000);

        // Function to switch to review page
        function openReview() {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('review-page').style.display = 'block';
        }

        // Function to send data to Google Sheets
        function submitReview() {
            const message = document.getElementById('userReview').value;
            
            if (message.trim() === "") {
                alert("Please write a review before submitting!");
                return;
            }

            const data = { name: "Iqra Student", rating: "5", message: message };

            // Sending data to your Google Web App
            fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify(data) 
            })
            .then(() => {
                alert("Thank you! Your review has been successfully submitted.");
                location.reload(); 
            })
            .catch(err => {
                console.error('Error!', err.message);
                alert("Something went wrong. Please check your internet.");
            });
        }
    </script>
</body>
</html>
